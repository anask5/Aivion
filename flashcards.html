<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="/css/font.css">
    <link rel="icon" href="public/logo.jpeg" class="logo">
    <link rel="stylesheet" href="/css/flashcards.css">
</head>

<body>
    <header class="header">

        <nav class="nav">

            <a href="index.html" class="navbar__logo">
                <image src="/public/logo.png" alt="AIVION Logo" id="logo">
            </a>
            <div class="hamburger" id="hamburger">
                ☰
            </div>

            <ul class="navbar_menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="summarize.html">Summarize</a></li>
                <li><a href="chatbot.html">Chat bot</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="contact.html">Contact </a></li>

            </ul>
        </nav>
    </header>
    <main>

        <main class="main">

            <div class="hero">
                <h1>Flashcards Generator</h1>
                <p>Turn your notes into smart flashcards instantly</p>
            </div>

            <div class="input-box">
                <textarea id="inputText" placeholder="Paste your notes or topic..."></textarea>
                <button id="generateBtn">Generate Flashcards</button>
            </div>

            <div id="cardsContainer" class="cards-grid"></div>

        </main>

        <script src="/js/flashcards.js"></script>
        <script src="/js/index.js"></script>

        <div id="footer"></div>
        <script>
            fetch("footer.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("footer").innerHTML = data;
                });
        </script>
</body>

</html>
